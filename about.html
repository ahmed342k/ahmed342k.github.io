  <style>
    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      font-family:Arial,sans-serif;
    }

    :root{
      --bg1:#0b0d12;
      --bg2:#12161d;
      --glass:rgba(255,255,255,0.08);
      --border:rgba(255,255,255,0.14);
      --text:#ffffff;
      --sub:#cfd6df;
      --blue:#4f8cff;
      --shadow:0 20px 50px rgba(0,0,0,0.35);
      --card:rgba(255,255,255,0.05);
      --btn:rgba(255,255,255,0.08);
      --btnBorder:rgba(255,255,255,0.12);
      --soft:rgba(79,140,255,0.10);
    }

    body{
      margin:0;
      min-height:100vh;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(79,140,255,0.16), transparent 30%),
        radial-gradient(circle at top left, rgba(255,255,255,0.06), transparent 22%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      overflow-x:hidden;
    }

    .container{
      max-width:760px;
      margin:auto;
      padding:24px 14px 40px;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }

    .top-btn{
      min-width:120px;
      background:var(--btn);
      color:var(--text);
      border:1px solid var(--btnBorder);
      border-radius:18px;
      padding:12px 14px;
      font-size:15px;
      text-align:center;
      text-decoration:none;
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      box-shadow:var(--shadow);
    }

    .back-btn{
      display:inline-block;
      margin-bottom:16px;
      color:var(--text);
      text-decoration:none;
      font-size:18px;
      background:var(--btn);
      border:1px solid var(--btnBorder);
      border-radius:16px;
      padding:10px 14px;
    }

    .hero-box,
    .box{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:28px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }

    .hero-box{
      padding:24px 18px;
      margin-bottom:16px;
      text-align:center;
    }

    .hero-badge{
      display:inline-block;
      padding:8px 14px;
      border-radius:999px;
      background:var(--soft);
      border:1px solid var(--btnBorder);
      color:var(--text);
      font-size:14px;
      margin-bottom:12px;
    }

    .box{
      padding:24px 18px;
    }

    h1{
      margin:0 0 12px;
      font-size:34px;
      text-align:center;
      line-height:1.4;
    }

    .hero-text{
      color:var(--sub);
      font-size:17px;
      line-height:2;
      margin:0;
    }

    .desc{
      color:var(--sub);
      font-size:18px;
      line-height:2;
      text-align:right;
    }

    .section{
      margin-top:18px;
      padding-top:18px;
      border-top:1px solid rgba(255,255,255,0.08);
    }

    .section h2{
      margin:0 0 10px;
      font-size:23px;
      color:var(--text);
      line-height:1.5;
    }

    .section p{
      margin:0;
      color:var(--sub);
      font-size:17px;
      line-height:2;
    }

    .cards{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:16px;
    }

    .card{
      background:var(--btn);
      border:1px solid var(--btnBorder);
      border-radius:20px;
      padding:16px;
    }

    .card h3{
      margin:0 0 10px;
      color:var(--text);
      font-size:18px;
      line-height:1.5;
    }

    .card p{
      margin:0;
      color:var(--sub);
      font-size:15px;
      line-height:1.9;
    }

    .list{
      margin:12px 0 0;
      padding:0;
      list-style:none;
      display:grid;
      gap:10px;
    }

    .list li{
      background:var(--btn);
      border:1px solid var(--btnBorder);
      border-radius:18px;
      padding:14px;
      color:var(--sub);
      font-size:16px;
      line-height:1.9;
    }

    footer{
      margin-top:24px;
      padding:18px 12px;
      text-align:center;
      color:var(--sub);
      font-size:15px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:24px;
      box-shadow:var(--shadow);
    }

    footer a{
      color:var(--sub);
      text-decoration:none;
      margin:0 8px;
    }

    .footer-note{
      margin-top:10px;
      line-height:1.9;
      font-size:14px;
    }

    @media (max-width:640px){
      .cards{
        grid-template-columns:1fr;
      }

      h1{
        font-size:29px;
      }

      .section h2{
        font-size:21px;
      }

      .desc,
      .section p,
      .hero-text{
        font-size:16px;
      }

      .top-bar{
        flex-direction:column;
        align-items:stretch;
      }

      .top-btn{
        width:100%;
      }
    }
  </style>
