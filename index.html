<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>حساب العمر</title>

<link rel="icon" href="icon.png">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial;
}

body{

--bg:#0f1117;
--card:#171a22;
--text:#ffffff;
--sub:#bfc7d5;
--blue:#4f8cff;

background:var(--bg);
color:var(--text);

}

body.light{

--bg:#f3f6fb;
--card:#ffffff;
--text:#111;
--sub:#666;

}

.container{

max-width:520px;
margin:auto;
padding:20px;

}

.top{

display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:15px;

}

.brand{

font-size:22px;
font-weight:bold;

}

.smallBtn{

border:none;
background:var(--card);
color:var(--text);
padding:8px 12px;
border-radius:12px;
cursor:pointer;

}

.card{

background:var(--card);
padding:20px;
border-radius:18px;
margin-bottom:15px;

}

.birth{

width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:14px;
background:var(--blue);
color:white;
cursor:pointer;
margin-bottom:15px;

}

.options{

display:grid;
grid-template-columns:1fr 1fr;
gap:10px;

}

.opt{

background:var(--card);
padding:12px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;

}

.switch{

width:44px;
height:24px;
background:#777;
border-radius:20px;
position:relative;
cursor:pointer;

}

.switch:before{

content:"";
width:18px;
height:18px;
background:white;
position:absolute;
top:3px;
right:3px;
border-radius:50%;
transition:.2s;

}

.switch.active{

background:var(--blue);

}

.switch.active:before{

transform:translateX(-20px);

}

.calc{

width:100%;
margin-top:15px;
padding:14px;
border:none;
border-radius:14px;
background:var(--blue);
color:white;
font-size:18px;
cursor:pointer;

}

.error{

color:#ff7a7a;
margin-top:10px;

}

</style>
</head>


<body>

<div class="container">


<div class="top">

<button class="smallBtn" onclick="toggleLang()">AR/EN</button>

<div class="brand">Noor</div>

<button class="smallBtn" onclick="toggleTheme()">☀</button>

</div>


<div class="card">

<button class="birth" onclick="setBirth()">اختر تاريخ الميلاد</button>


<div class="options">

<div class="opt">العمر الميلادي<div class="switch active" id="age"></div></div>
<div class="opt">العمر الهجري<div class="switch active" id="hijri"></div></div>

<div class="opt">كمية الماء<div class="switch" id="water"></div></div>
<div class="opt">ساعات النوم<div class="switch" id="sleep"></div></div>

<div class="opt">عدد الوجبات<div class="switch" id="meals"></div></div>
<div class="opt">عدد رمضاناتك<div class="switch" id="ramadan"></div></div>

<div class="opt">عدد الصلوات<div class="switch" id="prayers"></div></div>
<div class="opt">كم ساعة عشت<div class="switch" id="hours"></div></div>

<div class="opt">نبضات القلب<div class="switch" id="heart"></div></div>

</div>


<button class="calc" onclick="calculate()">احسب</button>

<div class="error" id="error"></div>

</div>

</div>


<script>

let state=JSON.parse(localStorage.getItem("ageData")||"{}")

let birth=state.birth||null
let lang=state.lang||"ar"

let opts=state.opts||{

age:true,
hijri:true,
water:false,
sleep:false,
meals:false,
ramadan:false,
prayers:false,
hours:false,
heart:false

}

if(state.theme=="light"){

document.body.classList.add("light")

}

function save(){

localStorage.setItem("ageData",JSON.stringify({

birth,
lang,
opts,
theme:document.body.classList.contains("light")?"light":"dark"

}))

}

document.querySelectorAll(".switch").forEach(sw=>{

let id=sw.id

if(opts[id]) sw.classList.add("active")

sw.onclick=()=>{

sw.classList.toggle("active")
opts[id]=sw.classList.contains("active")

save()

}

})


function toggleTheme(){

document.body.classList.toggle("light")
save()

}


function toggleLang(){

lang=lang=="ar"?"en":"ar"
save()
location.reload()

}


function setBirth(){

let d=prompt("day")
let m=prompt("month")
let y=prompt("year")

if(!d||!m||!y)return

birth={d,m,y}

save()

}


function calculate(){

if(!birth){

document.getElementById("error").innerText="اختر تاريخ الميلاد"
return

}

save()

location="result.html"

}

</script>

</body>
</html>
